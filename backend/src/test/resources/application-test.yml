spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true

app:
  jwt:
    secret: test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-testing
    expiration: 86400000
